version: '3.8'

services:
  grafana-plugins-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grafana-plugins-server
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ZIP_DIR=/app/zips
      - STORAGE_TYPE=local
      - ADMIN_USER=admin
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      - SESSION_SECRET=${SESSION_SECRET}
      - SESSION_MAX_AGE=3600000
    volumes:
      # Read-write para suportar upload e exclusao
      - ./zips:/app/zips
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - grafana-network

networks:
  grafana-network:
    driver: bridge
