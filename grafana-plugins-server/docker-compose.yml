services:
  grafana-plugins-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grafana-plugins-server
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3000}
      - ZIP_DIR=/app/zips
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - SESSION_SECRET=${SESSION_SECRET:-dev-session-secret-change-me}
      - SESSION_MAX_AGE=${SESSION_MAX_AGE:-3600000}
      - TRUST_PROXY=${TRUST_PROXY:-0}
    volumes:
      # Read-write para suportar upload e exclusao
      - ./zips:/app/zips
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - grafana-network

networks:
  grafana-network:
    driver: bridge
